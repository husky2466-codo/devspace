<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dev-Space.ai v3</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
  #root { width:100vw; height:100vh; }
  * { box-sizing:border-box; }
  @keyframes smPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(1.25)} }
  @keyframes smCaret { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes smFinished { 0%,100%{box-shadow:0 0 0 1px rgba(74,222,128,0.5), 0 0 10px rgba(74,222,128,0.15)} 50%{box-shadow:0 0 0 2px rgba(74,222,128,0.9), 0 0 22px rgba(74,222,128,0.35)} }
  *::-webkit-scrollbar { width:5px; height:5px; }
  *::-webkit-scrollbar-thumb { background:rgba(128,128,128,.22); border-radius:3px; }
  *::-webkit-scrollbar-track { background:transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="ide-v3.jsx"></script>
<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById('root')).render(<IDEV3 />);
</script>
</body>
</html>
